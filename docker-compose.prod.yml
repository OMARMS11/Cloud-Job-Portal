version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - backend

  job-service:
    build:
      context: ./job-service
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - elasticsearch
    networks:
      - backend

  application-service:
    build:
      context: ./application-service
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: /api/users
        NEXT_PUBLIC_JOB_SERVICE_URL: /api/jobs
        NEXT_PUBLIC_APP_SERVICE_URL: /api/applications
    restart: always
    depends_on:
      - user-service
      - job-service
      - application-service
    networks:
      - frontend

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - user-service
      - job-service
      - application-service
    networks:
      - frontend
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    restart: always
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - backend

  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    restart: always
    depends_on:
      - elasticsearch
    networks:
      - backend

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.5.0
    user: root
    restart: always
    command: filebeat -e -strict.perms=false
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml
    depends_on:
      - elasticsearch
    networks:
      - backend

volumes:
  postgres_data:
  es_data:

networks:
  frontend:
  backend:
