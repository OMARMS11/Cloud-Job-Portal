version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: job-portal-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - app-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service-prod
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: user_db
      SECRET_KEY: ${USER_SERVICE_SECRET_KEY}
      PORT: 3000
      NODE_ENV: production
    networks:
      - app-network-prod
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  job-service:
    build:
      context: ./job-service
      dockerfile: Dockerfile
    container_name: job-service-prod
    restart: always
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: job_db
      SECRET_KEY: ${JOB_SERVICE_SECRET_KEY}
      PORT: 3000
      NODE_ENV: production
    networks:
      - app-network-prod
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  application-service:
    build:
      context: ./application-service
      dockerfile: Dockerfile
    container_name: application-service-prod
    restart: always
    ports:
      - "3003:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: application_db
      SECRET_KEY: ${APP_SERVICE_SECRET_KEY}
      PORT: 3000
      JOB_SERVICE_HOST: job-service:3000
      NODE_ENV: production
    networks:
      - app-network-prod
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  postgres_data_prod:

networks:
  app-network-prod:
