apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service
  namespace: job-portal
  labels:
    app: application-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: application-service
  template:
    metadata:
      labels:
        app: application-service
    spec:
      containers:
        - name: application-service
          image: application-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: job-portal-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: job-portal-config
                  key: DB_PORT
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: job-portal-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: job-portal-secret
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              value: "application_db"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: job-portal-secret
                  key: SECRET_KEY
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: job-portal-config
                  key: PORT
            - name: JOB_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: job-portal-config
                  key: JOB_SERVICE_HOST
---
apiVersion: v1
kind: Service
metadata:
  name: application-service
  namespace: job-portal
spec:
  selector:
    app: application-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
