version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: job-portal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - backend

  user-service:
    image: omarms111/user-service:latest
    container_name: user-service
    restart: always
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: user_db
      SECRET_KEY: SECRET_KEY
    ports:
      - "3001:3000"
    networks:
      - backend

  job-service:
    image: omarms111/job-service:latest
    container_name: job-service
    restart: always
    depends_on:
      - postgres
      - elasticsearch
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: job_db
      SECRET_KEY: SECRET_KEY
      ELASTICSEARCH_NODE: http://elasticsearch:9200
    ports:
      - "3002:3000"
    networks:
      - backend

  application-service:
    image: omarms111/application-service:latest
    container_name: application-service
    restart: always
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: application_db
      SECRET_KEY: SECRET_KEY
      JOB_SERVICE_HOST: http://job-service:3000
    ports:
      - "3003:3000"
    networks:
      - backend

  frontend:
    image: omarms111/frontend:latest
    container_name: frontend
    restart: always
    depends_on:
      - user-service
      - job-service
      - application-service
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_JOB_SERVICE_URL: http://localhost:3002
      NEXT_PUBLIC_APP_SERVICE_URL: http://localhost:3003
    ports:
      - "3000:3000"
    networks:
      - frontend
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: elasticsearch
    restart: always
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - backend

  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: kibana
    restart: always
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - backend

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.5.0
    container_name: filebeat
    user: root
    restart: always
    command: filebeat -e -strict.perms=false
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml
    depends_on:
      - elasticsearch
    networks:
      - backend

volumes:
  postgres_data:
  es_data:

networks:
  frontend:
  backend:
